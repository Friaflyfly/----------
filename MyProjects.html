<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的项目 - 天合短剧剪辑接单平台</title>
  
  <!-- Ant Design CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .appLayout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 200px;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.06);
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebarHeader {
      padding: 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #1890ff;
      text-decoration: none;
      display: block;
    }

    .menu {
      padding: 16px 0;
    }

    .menuItem {
      display: block;
      padding: 12px 24px;
      color: #262626;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
      border-left: 3px solid transparent;
    }

    .menuItem:hover {
      background-color: #f0f0f0;
      color: #1890ff;
    }

    .menuItem.active {
      background-color: #e6f7ff;
      color: #1890ff;
      border-left-color: #1890ff;
      font-weight: 500;
    }

    .menuItemIcon {
      margin-right: 8px;
      font-size: 16px;
    }

    .menuGroup {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .menuGroupTitle {
      padding: 8px 24px;
      font-size: 12px;
      color: #8c8c8c;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .mainContent {
      flex: 1;
      margin-left: 200px;
      min-height: 100vh;
      background: #f5f5f5;
    }

    .myProjectsPage {
      padding: 24px;
    }

    .pageHeader {
      background: #fff;
      padding: 16px 24px;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .filterCard {
      background: #fff;
      padding: 16px 24px;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .tableCard {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .mainContent {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  
  <!-- Day.js -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
  
  <!-- Ant Design JS -->
  <script src="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.js"></script>
  
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { Card, Table, Button, Tag, Space, Select, Typography } = antd;
    const { Title } = Typography;
    const { Option } = Select;

    const MyProjects = () => {
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(false);
      const [statusFilter, setStatusFilter] = useState('');

      useEffect(() => {
        loadOrders();
      }, []);

      const loadOrders = () => {
        setLoading(true);
        let data = JSON.parse(localStorage.getItem('currentOrders') || '[]');
        if (data.length === 0) {
          data = generateMockOrders();
          localStorage.setItem('currentOrders', JSON.stringify(data));
        }
        
        // 从财务账本中获取扣款信息，计算实付金额
        const financeLedger = JSON.parse(localStorage.getItem('financeLedger') || '[]');
        const ledgerMap = {};
        financeLedger.forEach(item => {
          ledgerMap[item.orderId] = item;
        });
        
        // 为每个订单添加预估金额和实付金额
        data = data.map(order => {
          const orderId = order.orderId || order.id;
          const ledgerItem = ledgerMap[orderId];
          const estimatedAmount = order.amount || order.unitPrice || 0;
          const deduction = ledgerItem ? (ledgerItem.deduction || 0) : 0;
          const actualAmount = estimatedAmount - deduction;
          
          return {
            ...order,
            estimatedAmount: estimatedAmount,
            actualAmount: actualAmount,
            deduction: deduction,
            isOrder: true, // 标记为订单
          };
        });

        // 读取报名申请：待审核（Pending）与已驳回（Rejected），便于查看「已报名但未通过」情况
        const applications = JSON.parse(localStorage.getItem('applications') || '[]');
        const pendingApplications = applications
          .filter(app => app.applicant === '当前用户' && app.status === 'Pending')
          .map(app => ({
            id: app.id,
            orderId: null,
            applicationId: app.id,
            projectId: app.projectId,
            projectName: app.projectName,
            takeTime: app.applyTime,
            dueTime: null,
            status: 'Pending',
            amount: 0,
            estimatedAmount: 0,
            actualAmount: 0,
            deduction: 0,
            isOrder: false,
            applyTime: app.applyTime,
          }));
        const rejectedApplications = applications
          .filter(app => app.applicant === '当前用户' && app.status === 'Rejected')
          .map(app => ({
            id: app.id,
            orderId: null,
            applicationId: app.id,
            projectId: app.projectId,
            projectName: app.projectName,
            takeTime: app.applyTime,
            dueTime: null,
            status: 'Rejected',
            amount: 0,
            estimatedAmount: 0,
            actualAmount: 0,
            deduction: 0,
            isOrder: false,
            rejectReason: app.rejectReason,
            reviewTime: app.reviewTime,
          }));

        // 合并订单 + 待审核报名 + 已驳回报名
        data = [...data, ...pendingApplications, ...rejectedApplications];

        // 若没有任何报名记录，注入示例行便于查看「已报名未通过」的展示样式（仅展示用）
        if (pendingApplications.length === 0 && rejectedApplications.length === 0) {
          var demoApplyTime = dayjs().subtract(1, 'day').format('YYYY-MM-DD HH:mm:ss');
          data = data.concat([
            { id: 'DEMO_PENDING', orderId: null, applicationId: 'APPLY_DEMO_001', projectId: 'demo_p', projectName: '示例项目（报名待审核）', takeTime: demoApplyTime, dueTime: null, status: 'Pending', amount: 0, estimatedAmount: 0, actualAmount: 0, deduction: 0, isOrder: false, applyTime: demoApplyTime },
            { id: 'DEMO_REJECTED', orderId: null, applicationId: 'APPLY_DEMO_002', projectId: 'demo_p2', projectName: '示例项目（报名已驳回）', takeTime: dayjs().subtract(2, 'day').format('YYYY-MM-DD HH:mm:ss'), dueTime: null, status: 'Rejected', amount: 0, estimatedAmount: 0, actualAmount: 0, deduction: 0, isOrder: false, rejectReason: '示例：不符合本期项目要求', reviewTime: dayjs().subtract(1, 'day').format('YYYY-MM-DD HH:mm:ss') },
          ]);
        }

        setOrders(data);
        setLoading(false);
      };

      const generateMockOrders = () => {
        const projects = [
          { id: '1', name: '霸道总裁爱上我', category: '短剧' },
          { id: '2', name: 'AI漫剧：穿越时空的冒险', category: 'AI漫剧' },
          { id: '3', name: '短剧：古装仙侠传奇', category: '短剧' },
          { id: '4', name: '综艺剪辑：真人秀精彩片段', category: '综艺' },
          { id: '5', name: '短视频：美食探店系列', category: '短视频' },
        ];
        const statuses = ['InProgress', 'Submitted', 'NeedRevision', 'Approved', 'Accepted', 'Closed'];
        return projects.map((p, i) => {
          const status = statuses[i % statuses.length];
          const takeTime = dayjs().subtract(10 - i * 2, 'day').format('YYYY-MM-DD HH:mm:ss');
          const dueTime = dayjs().add(5 + i, 'day').format('YYYY-MM-DD HH:mm:ss');
          const orderId = `ORD${String(i + 1).padStart(6, '0')}`;
          const estimatedAmount = [500, 800, 600, 400, 300][i] * (10 + i * 2);
          return {
            orderId: orderId,
            id: orderId,
            projectId: p.id,
            projectName: p.name,
            category: p.category,
            takeTime: takeTime,
            dueTime: dueTime,
            status: status,
            amount: estimatedAmount,
            estimatedAmount: estimatedAmount,
            actualAmount: estimatedAmount, // 初始时实付金额等于预估金额
            deduction: 0,
          };
        });
      };

      const filteredOrders = useMemo(() => {
        if (!statusFilter) return orders;
        return orders.filter((o) => o.status === statusFilter);
      }, [orders, statusFilter]);

      const statusMap = {
        'InProgress': { color: 'blue', text: '进行中' },
        'Submitted': { color: 'green', text: '已提交' },
        'NeedRevision': { color: 'orange', text: '退回修改' },
        'Approved': { color: 'green', text: '审核通过' },
        'Accepted': { color: 'success', text: '已验收' },
        'Closed': { color: 'default', text: '已关闭' },
        'Pending': { color: 'orange', text: '报名待审核' },
        'Rejected': { color: 'red', text: '报名已驳回' },
      };

      const goToSpace = (record) => {
        // 根据业务逻辑：一个项目ID对应一个项目空间，多个订单共享一个项目空间
        const pid = record.projectId;
        const oid = record.orderId || record.id;
        
        if (pid) {
          // 优先使用项目ID访问项目空间
          if (oid) {
            // 如果有订单ID，同时传递（用于兼容）
            window.location.href = `ProjectSpace.html?projectId=${pid}&orderId=${oid}`;
          } else {
            // 只有项目ID也可以访问项目空间
            window.location.href = `ProjectSpace.html?projectId=${pid}`;
          }
        } else if (oid) {
          // 兼容旧版本：如果没有项目ID，使用订单ID
          window.location.href = `ProjectSpace.html?orderId=${oid}`;
        }
      };

      const columns = [
        {
          title: '类型',
          key: 'sourceType',
          width: 100,
          render: (_, r) => {
            if (r.isOrder === false) {
              return r.status === 'Pending' ? <Tag color="orange">报名待审核</Tag> : <Tag color="red">报名已驳回</Tag>;
            }
            return <Tag color="blue">订单</Tag>;
          },
        },
        {
          title: '订单号/申请单号',
          dataIndex: 'orderId',
          key: 'orderId',
          width: 160,
          render: (val, r) => {
            if (r.isOrder === false && r.applicationId) {
              return r.applicationId || '-';
            }
            return val || r.id || '-';
          },
        },
        {
          title: '项目名称',
          dataIndex: 'projectName',
          key: 'projectName',
          ellipsis: true,
        },
        {
          title: '接单/申请时间',
          dataIndex: 'takeTime',
          key: 'takeTime',
          width: 180,
          render: (t, record) => {
            if (!t) return '-';
            const formatted = dayjs(t).format('YYYY-MM-DD HH:mm:ss');
            return record.isOrder === false ? (
              <span title="报名申请时间">{formatted}</span>
            ) : formatted;
          },
        },
        {
          title: '截止时间',
          dataIndex: 'dueTime',
          key: 'dueTime',
          width: 180,
          render: (t) => (t ? dayjs(t).format('YYYY-MM-DD HH:mm:ss') : '-'),
        },
        {
          title: '状态',
          dataIndex: 'status',
          key: 'status',
          width: 150,
          render: (status, record) => {
            const c = statusMap[status] || { color: 'default', text: status };
            return (
              <div>
                <Tag color={c.color}>{c.text}</Tag>
                {status === 'Rejected' && record.rejectReason && (
                  <div style={{ marginTop: 4, fontSize: 12, color: '#ff4d4f' }}>
                    驳回原因：{record.rejectReason}
                  </div>
                )}
              </div>
            );
          },
        },
        {
          title: '订单预估金额',
          dataIndex: 'estimatedAmount',
          key: 'estimatedAmount',
          width: 150,
          align: 'right',
          render: (amount) => (
            <span style={{ fontWeight: 500 }}>¥{amount ? amount.toLocaleString() : 0}</span>
          ),
        },
        {
          title: '订单实付金额',
          dataIndex: 'actualAmount',
          key: 'actualAmount',
          width: 150,
          align: 'right',
          render: (amount, record) => {
            const hasDeduction = record.deduction && record.deduction > 0;
            return (
              <span style={{ 
                fontWeight: 500, 
                color: hasDeduction ? '#ff4d4f' : '#52c41a' 
              }}>
                ¥{amount ? amount.toLocaleString() : 0}
                {hasDeduction && (
                  <span style={{ fontSize: 12, color: '#8c8c8c', marginLeft: 4 }}>
                    (已扣¥{record.deduction.toLocaleString()})
                  </span>
                )}
              </span>
            );
          },
        },
        {
          title: '操作',
          key: 'action',
          width: 120,
          render: (_, record) => {
            // 报名待审核：仅展示状态，不可进入空间
            if (record.status === 'Pending' && record.isOrder === false) {
              return <span style={{ color: '#fa8c16', fontSize: 12 }}>等待运营审核</span>;
            }
            // 报名已驳回：仅展示状态
            if (record.status === 'Rejected' && record.isOrder === false) {
              return <span style={{ color: '#8c8c8c', fontSize: 12 }}>申请已驳回</span>;
            }
            return (
              <Button type="primary" size="small" onClick={() => goToSpace(record)}>
                项目空间
              </Button>
            );
          },
        },
      ];

      return (
        <div className="appLayout">
          <div className="sidebar">
            <div className="sidebarHeader">
              <a href="Home.html" className="logo">🎬 天合短剧平台</a>
            </div>
            <nav className="menu">
              <a href="Home.html" className="menuItem">
                <span className="menuItemIcon">🏠</span>
                首页
              </a>
              <a href="ProjectHall.html" className="menuItem">
                <span className="menuItemIcon">📋</span>
                接单大厅
              </a>
              <a href="Leaderboard.html" className="menuItem">
                <span className="menuItemIcon">🏆</span>
                天梯榜单
              </a>
              <a href="Account.html" className="menuItem">
                <span className="menuItemIcon">💰</span>
                账户与收益
              </a>
              <a href="account-basic-info-prototype.html" className="menuItem">
                <span className="menuItemIcon">👤</span>
                账户基础信息
              </a>
              <a href="enterprise-verification-prototype.html" className="menuItem">
                <span className="menuItemIcon">🏢</span>
                企业认证
              </a>
              <a href="account-security-prototype.html" className="menuItem">
                <span className="menuItemIcon">🔐</span>
                账号安全
              </a>
              <a href="MyProjects.html" className="menuItem active">
                <span className="menuItemIcon">🚀</span>
                我的项目
              </a>
              <div className="menuGroup">
                <div className="menuGroupTitle">后台管理</div>
                <a href="ReviewQueue.html" className="menuItem">
                  <span className="menuItemIcon">✅</span>
                  任务审核
                </a>
                <a href="ProjectManagement.html" className="menuItem">
                  <span className="menuItemIcon">📋</span>
                  项目管理
                </a>
                <a href="StudentManagement.html" className="menuItem">
                  <span className="menuItemIcon">👥</span>
                  学员管理
                </a>
                <a href="FinanceManagement.html" className="menuItem">
                  <span className="menuItemIcon">💰</span>
                  财务对账
                </a>
                <a href="DashboardManagement.html" className="menuItem" style={{ display: 'none' }}>
                  <span className="menuItemIcon">📊</span>
                  榜单与数据
                </a>
                <a href="DataBoard.html" className="menuItem">
                  <span className="menuItemIcon">📈</span>
                  数据看板
                </a>
              </div>
            </nav>
          </div>

          <div className="mainContent">
            <div className="myProjectsPage">
              <div className="pageHeader">
                <Title level={2} style={{ margin: 0 }}>我的项目</Title>
              </div>

              <div className="filterCard">
                <Space size="middle">
                  <span>状态：</span>
                  <Select
                    style={{ width: 140 }}
                    placeholder="全部"
                    allowClear
                    value={statusFilter || undefined}
                    onChange={(v) => setStatusFilter(v || '')}
                  >
                    <Option value="InProgress">进行中</Option>
                    <Option value="Submitted">已提交</Option>
                    <Option value="NeedRevision">退回修改</Option>
                    <Option value="Approved">审核通过</Option>
                    <Option value="Accepted">已验收</Option>
                    <Option value="Closed">已关闭</Option>
                    <Option value="Pending">报名待审核</Option>
                    <Option value="Rejected">报名已驳回</Option>
                  </Select>
                </Space>
              </div>

              <div className="tableCard">
                <Table
                  columns={columns}
                  dataSource={filteredOrders}
                  rowKey={(r) => r.orderId || r.id}
                  loading={loading}
                  scroll={{ x: 1200 }}
                  pagination={{
                    pageSize: 10,
                    showSizeChanger: true,
                    showTotal: (total) => `共 ${total} 条`,
                  }}
                  style={{ padding: '16px 24px' }}
                />
              </div>
            </div>
          </div>
        </div>
      );
    };

    window.addEventListener('load', function () {
      try {
        ReactDOM.render(<MyProjects />, document.getElementById('root'));
      } catch (e) {
        console.error('渲染错误:', e);
        document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;">页面加载失败，请查看控制台。</div>';
      }
    });
  </script>
</body>
</html>
