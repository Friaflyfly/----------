  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #262626; }

    .wallet-chip { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: linear-gradient(135deg, #fff7e6, #fff1d6); border: 1px solid #ffd591; border-radius: 18px; cursor: pointer; font-size: 13px; color: #d46b08; text-decoration: none; }

    .avatar-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; box-shadow: 0 6px 16px rgba(0,0,0,.12); padding: 8px; z-index: 300; }

    .btn-link:hover { border-color: #1890ff; color: #1890ff; }
    .btn-link.primary { background: #1890ff; border-color: #1890ff; color: #fff; }
    .btn-link.primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
    .empty { padding: 60px 20px; text-align: center; color: #8c8c8c; background: #fff; border-radius: 8px; }
    .toasts { position: fixed; top: 72px; right: 20px; width: min(90vw, 360px); display: grid; gap: 8px; z-index: 500; }
    .toast { background: #fff; border: 1px solid #d9d9d9; border-radius: 8px; padding: 10px 14px; font-size: 13px; box-shadow: 0 3px 12px rgba(0,0,0,.1); animation: slideIn .25s ease-out; }

    .toast.warn { border-color: #ffe58f; background: #fffbe6; color: #d48806; }

    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @media (max-width: 1100px) {
      .stat-row { grid-template-columns: 1fr; }

    }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 16px; } .topbar .brand-sub { display: none; } }

  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var stageFilter = "";
    var typeFilter = "";
    var scopeFilter = "all";
    var searchKey = "";

    var STATUS = {
      "auto-approved": { text: "撮合中 · 自动通过", stage: "pending", cls: "pending" },
      "matching": { text: "撮合中", stage: "pending", cls: "pending" },
      "quoting": { text: "待选承制方", stage: "pending", cls: "quoting" },
      "in-progress": { text: "履约中", stage: "doing", cls: "doing" },
      "completed": { text: "已完成", stage: "done", cls: "done" }
    };

    function parseSnapshot(d) {
      if (!d || !d.skuSnapshot) return {};
      if (typeof d.skuSnapshot === "string") {
        try { return JSON.parse(d.skuSnapshot); } catch (e) { return {}; }
      }
      return d.skuSnapshot || {};
    }

    function shortWorkspaceName(name) {
      return String(name || "").replace("骋风天合 · ", "") || "-";
    }

    function isStandardPackage(d, order) {
      return d.requirementType === "PLATFORM_SKU" || !!d.spuId || !!d.skuId || !!(order && order.projectName && order.projectName.indexOf("包") >= 0);
    }

    function packageInfo(d, order) {
      var snap = parseSnapshot(d);
      var sourceTitle = (snap.product || d.title || (order && order.projectName) || "").split(" · ");
      var tierObj = snap.tier || {};
      var productName = snap.product || sourceTitle[0] || d.title || "标准产品包";
      var tierName = tierObj.name || sourceTitle[1] || (d.skuId ? d.skuId : "按需求配置");
      var quantity = snap.quantity || snap.q || "";
      var unit = (tierObj && tierObj.unit) || "";
      var specParts = [];
      if (quantity) specParts.push(quantity + (unit || "项"));
      if (snap.spec) specParts.push(snap.spec);
      if (snap.duration) specParts.push(snap.duration + "秒");
      if (snap.ratio) specParts.push(snap.ratio);
      var addons = snap.addons || {};
      var addonNames = [
        addons.copy ? "文案" : "",
        addons.rush ? "加急" : "",
        addons.source ? "源文件" : ""
      ].filter(Boolean);
      var materialCount = Array.isArray(snap.materials) ? snap.materials.length : (Array.isArray(d.refs) ? d.refs.length : null);
      return {
        productName: productName,
        tierName: tierName,
        configText: specParts.join(" · ") || (d.category || "-"),
        addonText: addonNames.length ? addonNames.join(" / ") : "无增项",
        materialText: materialCount != null ? materialCount + " 个附件" : (isStandardPackage(d, order) ? "3 个附件" : "按需求文档"),
        snapshot: snap
      };
    }

    function stageInfo(d, order) {
      if (order) {
        if (order.status === "waiting-invoice") return { text: "待上传发票", next: "承制方补充结算发票", stage: "settlement", cls: "settlement" };
        if (order.status === "invoice-reviewing") return { text: "发票校验中", next: "平台财务校验发票", stage: "settlement", cls: "settlement" };
        if (order.status === "pending-settlement") return { text: "待分账", next: "财务确认后分账", stage: "settlement", cls: "settlement" };
        if (order.status === "completed") return { text: "已完成", next: "订单归档", stage: "done", cls: "done" };
        if (order.status === "review-v3" || order.status === "reviewing" || order.acceptanceStatus === "pending") return { text: "待验收", next: "需求方确认验收", stage: "doing", cls: "doing" };
        if (order.status === "in-progress") return { text: "履约中", next: "承制方交付版本", stage: "doing", cls: "doing" };
      }
      if (isStandardPackage(d, order) && d.status === "auto-approved") {
        return { text: "待平台派单", next: "标准包已自动通过", stage: "pending", cls: "pending" };
      }
      if (d.status === "quoting") return { text: "待选承制方", next: "选择报价并生成订单", stage: "pending", cls: "quoting" };
      if (d.status === "matching") return { text: "撮合中", next: "等待承制方响应", stage: "pending", cls: "pending" };
      if (d.status === "in-progress") return { text: "履约中", next: "查看交付进度", stage: "doing", cls: "doing" };
      if (d.status === "completed") return { text: "已完成", next: "订单归档", stage: "done", cls: "done" };
      return STATUS[d.status] || { text: d.status || "进行中", next: "查看详情", stage: "pending", cls: "pending" };
    }

    function financeInfo(d, order, standardPackage) {
      var amount = order ? order.amount : d.budget;
      var freezeText = standardPackage ? "预算已冻结" : "按需求预算";
      if (order && order.status === "completed") freezeText = "已结算";
      if (order && order.status === "pending-settlement") freezeText = "待分账";
      if (order && (order.status === "waiting-invoice" || order.status === "invoice-reviewing")) freezeText = "已验收待结算";
      if (d.paymentStatus === "pending") freezeText = "待付款";

      var invoiceText = "未到发票环节";
      if (order) {
        if (order.invoiceStatus === "approved") invoiceText = "发票已通过";
        else if (order.invoiceStatus === "uploaded") invoiceText = "发票已上传";
        else if (order.status === "waiting-invoice") invoiceText = "待上传发票";
        else if (order.status === "invoice-reviewing") invoiceText = "发票校验中";
        else if (order.status === "pending-settlement") invoiceText = "可分账";
        else if (order.status === "completed") invoiceText = "已完成分账";
      }
      return { amount: amount, freezeText: freezeText, invoiceText: invoiceText };
    }

    function getSpaces() {
      var demands = window.demoApp.getDemands().filter(function (d) { return !!d.projectSpaceId; });
      var orders = window.demoApp.getOrders();
      return demands.map(function (d) {
        var order = orders.find(function (o) { return o.demandId === d.id; });
        var standardPackage = isStandardPackage(d, order);
        var pkg = packageInfo(d, order);
        var status = stageInfo(d, order);
        var finance = financeInfo(d, order, standardPackage);
        var ws = window.demoApp.WORKSPACES[d.workspace] || { name: d.workspaceName || d.workspace };
        var href = order
          ? "project-space.html?orderId=" + order.id
          : "project-space.html?projectSpaceId=" + d.projectSpaceId + "&demandId=" + d.id;
        return {
          id: d.projectSpaceId,
          title: d.title,
          demandId: d.id,
          orderId: order ? order.id : "",
          typeKey: standardPackage ? "sku" : "custom",
          typeText: standardPackage ? "标准产品包" : "自定义需求",
          workspace: d.workspace,
          workspaceName: ws.name,
          category: d.category,
          packageName: pkg.productName,
          tierName: pkg.tierName,
          configText: pkg.configText,
          addonText: pkg.addonText,
          materialText: pkg.materialText,
          contractor: order ? order.contractor : (d.contractor || "待选定"),
          amount: finance.amount,
          financeText: finance.freezeText,
          invoiceText: finance.invoiceText,
          deadline: d.deadline,
          createdAt: d.projectSpaceCreatedAt || d.createTime,
          status: status,
          href: href
        };
      });
    }

    function renderStats(list) {
      var cards = [
        { label: "全部空间", value: list.length },
        { label: "标准产品包", value: list.filter(function (x) { return x.typeKey === "sku"; }).length },
        { label: "履约中", value: list.filter(function (x) { return x.status.stage === "doing"; }).length },
        { label: "发票 / 结算中", value: list.filter(function (x) { return x.status.stage === "settlement"; }).length },
        { label: "已完成", value: list.filter(function (x) { return x.status.stage === "done"; }).length }
      ];
      $("statRow").innerHTML = cards.map(function (c) {
        return '<div class="stat-card"><div class="stat-label">' + c.label + '</div><div class="stat-value">' + c.value + '<span style="font-size:13px;color:#8c8c8c;font-weight:400;margin-left:4px">个</span></div></div>';
      }).join("");
    }

    function render() {
      var curWs = window.demoApp.getCurrentWorkspaceId();
      var list = getSpaces();
      if (scopeFilter === "current") list = list.filter(function (x) { return x.workspace === curWs; });
      if (typeFilter) list = list.filter(function (x) { return x.typeKey === typeFilter; });
      if (stageFilter) list = list.filter(function (x) { return x.status.stage === stageFilter; });
      if (searchKey) {
        var k = searchKey.toLowerCase();
        list = list.filter(function (x) {
          return [x.id, x.title, x.demandId, x.orderId, x.contractor, x.packageName, x.tierName, x.configText].join(" ").toLowerCase().indexOf(k) >= 0;
        });
      }
      $("resultCount").textContent = "共 " + list.length + " 个空间";
      renderStats(scopeFilter === "current" ? getSpaces().filter(function (x) { return x.workspace === curWs; }) : getSpaces());
      if (!list.length) {
        $("spaceBody").innerHTML = '<div class="empty">暂无符合条件的项目空间<br><a href="demand-list.html" style="color:#1890ff;text-decoration:none">返回我的需求查看审核状态 →</a></div>';
        return;
      }
      $("spaceBody").innerHTML = list.map(function (s) {
        return '<div class="space-row">'
          + '<div class="cell-main"><span class="type-badge ' + s.typeKey + '">' + (s.typeKey === "sku" ? "📦" : "🧩") + ' ' + s.typeText + '</span><a class="space-title" href="' + s.href + '">🤝 ' + (s.typeKey === "sku" ? s.packageName : s.title) + '</a><div class="space-id">' + s.id + ' · ' + s.demandId + (s.orderId ? ' · ' + s.orderId : '') + '</div><div class="muted">' + (s.typeKey === "sku" ? s.title : s.category) + '</div></div>'
          + '<div><div class="meta-line"><b>' + s.tierName + '</b></div><div class="meta-line">' + s.configText + '</div><div class="muted">增项：' + s.addonText + '</div><span class="sub-tag">素材：' + s.materialText + '</span></div>'
          + '<div><span class="status ' + s.status.cls + '">' + s.status.text + '</span><div class="muted">下一步：' + (s.status.next || "查看详情") + '</div></div>'
          + '<div><div style="font-size:13px;color:#262626">' + s.contractor + '</div><div class="muted">' + shortWorkspaceName(s.workspaceName) + '</div></div>'
          + '<div class="finance-cell"><div class="amount">' + window.fmtMoney(s.amount) + '</div><div class="muted">' + s.financeText + '</div><div class="muted">' + s.invoiceText + '</div></div>'
          + '<div><div style="font-size:12px;color:#595959">创建 ' + s.createdAt + '</div><div class="muted">交付 ' + s.deadline + '</div></div>'
          + '<div class="row-actions"><a class="btn-link primary" href="' + s.href + '">进入</a><a class="btn-link" href="demand-detail.html?demandId=' + s.demandId + '">需求</a></div>'
          + '</div>';
      }).join("");
    }

    $("scopeFilter").addEventListener("change", function (e) { scopeFilter = e.target.value; render(); });
    $("typeFilter").addEventListener("change", function (e) { typeFilter = e.target.value; render(); });
    $("stageFilter").addEventListener("change", function (e) { stageFilter = e.target.value; render(); });
    $("searchInput").addEventListener("input", function (e) { searchKey = e.target.value.trim(); render(); });
    window.onWorkspaceChanged = render;
    render();
  })();
  </script>
</body>
</html>
