    .ws-item .ws-item-name { font-weight: 500; color: #262626; }
    .ws-item .ws-item-desc { font-size: 12px; color: #8c8c8c; margin-top: 2px; }

    .quotes-count.active::before { content: "🔥"; }

    .row-actions { display: flex; gap: 6px; }
    .btn-link { padding: 4px 10px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; color: #595959; font-size: 12px; cursor: pointer; text-decoration: none; }
    .btn-link:hover { border-color: #1890ff; color: #1890ff; }
    .btn-link.primary { background: #1890ff; border-color: #1890ff; color: #fff; }
    .btn-link.primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }
    .btn-link.urgent { background: #ff4d4f; border-color: #ff4d4f; color: #fff; }

    .empty { padding: 60px 20px; text-align: center; color: #8c8c8c; font-size: 14px; }

    .btn { height: 36px; border: 1px solid #d9d9d9; background: #fff; border-radius: 6px; padding: 0 18px; font-size: 14px; color: #595959; cursor: pointer; }
    .btn.primary { background: #1890ff; border-color: #1890ff; color: #fff; }
    .btn.primary:hover { background: #40a9ff; border-color: #40a9ff; color: #fff; }

    /* Toast */
    .toasts { position: fixed; top: 72px; right: 20px; width: min(90vw, 360px); display: grid; gap: 8px; z-index: 500; }
    .toast { background: #fff; border: 1px solid #d9d9d9; border-radius: 8px; padding: 10px 14px; font-size: 13px; box-shadow: 0 3px 12px rgba(0,0,0,.1); animation: slideIn .25s ease-out; }
    .toast.ok { border-color: #b7eb8f; background: #f6ffed; color: #389e0d; }
    .toast.err { border-color: #ffccc7; background: #fff2f0; color: #cf1322; }
    .toast.warn { border-color: #ffe58f; background: #fffbe6; color: #d48806; }
    .toast.info { border-color: #91d5ff; background: #e6f7ff; color: #096dd9; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    @media (max-width: 1100px) {
      .stat-row { grid-template-columns: repeat(3, 1fr); }
      .list-row { grid-template-columns: 2fr 1.2fr 1fr; }
      .list-row > :nth-child(n+4) { display: none; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 16px; }
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .ws-trigger { min-width: auto; }
      .topbar .brand-sub { display: none; }
    }
  </style>

  <script>
  (function () {
    const $ = (id) => document.getElementById(id);

    const STATUS_CONFIG = {
      "pending-payment": { label: "💳 待付款", className: "pending-payment", desc: "余额不足，尚未冻结预算，不进入审核 / 撮合" },
      "auditing":     { label: "📋 审核中", className: "auditing", desc: "平台核定需求中（≤24h）" },
      "matching":     { label: "🔍 撮合中", className: "matching", desc: "已通过审核，承制方报价中" },
      "auto-approved":{ label: "🔍 撮合中", className: "auto-approved", desc: "平台套餐 · 系统自动通过 · 撮合中", autoMark: true },
      "quoting":      { label: "💬 待选承制方", className: "quoting", desc: "已收到报价，请尽快选定" },
      "in-progress":  { label: "🛠 进行中", className: "in-progress", desc: "已下单，承制方制作中" },
      "completed":    { label: "✅ 已完成", className: "completed", desc: "已结算" },
      "cancelled":    { label: "🚫 已取消", className: "cancelled", desc: "需求方主动撤回" },
      "rejected":     { label: "❌ 已驳回", className: "rejected", desc: "未通过平台核定，请修改后重提" }
    };

    // 状态聚合卡片合并规则：matching 卡片同时统计 auto-approved（业务上等价）
    const STAT_GROUPS = {
      "all":         (d) => true,
      "pending-payment": (d) => d.status === "pending-payment",
      "auditing":    (d) => d.status === "auditing",
      "matching":    (d) => d.status === "matching" || d.status === "auto-approved",
      "quoting":     (d) => d.status === "quoting",
      "in-progress": (d) => d.status === "in-progress"
    };

    let activeStatus = "all";
    let activeScope = "all";
    let activeCat = "";
    let searchKey = "";
    const highlightId = new URLSearchParams(location.search).get("highlight");

    function renderStats() {
      const all = window.demoApp.getDemands();
      const filtered = activeScope === "current" ? all.filter((d) => d.workspace === window.demoApp.getCurrentWorkspaceId()) : all;
      const cards = [
        { key: "all",         label: "全部",         value: filtered.length },
        { key: "pending-payment", label: "待付款", value: filtered.filter(STAT_GROUPS["pending-payment"]).length },
        { key: "auditing",    label: "审核中",       value: filtered.filter(STAT_GROUPS.auditing).length },
        { key: "matching",    label: "撮合中",       value: filtered.filter(STAT_GROUPS.matching).length },
        { key: "quoting",     label: "待选承制方",    value: filtered.filter(STAT_GROUPS.quoting).length },
        { key: "in-progress", label: "进行中",       value: filtered.filter(STAT_GROUPS["in-progress"]).length }
      ];
      const html = cards.map((c) => '<div class="stat-card ' + (activeStatus === c.key ? "active" : "") + '" data-status="' + c.key + '"><div class="stat-label">' + c.label + '</div><div class="stat-value">' + c.value + '<span class="stat-suffix">条</span></div></div>').join("");
      $("statRow").innerHTML = html;
      $("statRow").querySelectorAll(".stat-card").forEach((el) => {
        el.addEventListener("click", () => { activeStatus = el.getAttribute("data-status"); render(); });
      });

      // 辅助计数：已驳回 / 已取消 / 已完成（不单独占聚合卡位）
      const rj = filtered.filter((d) => d.status === "rejected").length;
      const cn = filtered.filter((d) => d.status === "cancelled").length;
      const cp = filtered.filter((d) => d.status === "completed").length;
      let aux = $("statAux");
      if (!aux) {
        aux = document.createElement("div");
        aux.id = "statAux";
        aux.className = "stat-aux";
        $("statRow").parentNode.insertBefore(aux, $("statRow").nextSibling);
      }
      aux.innerHTML = '<a data-status="rejected">已驳回 ' + rj + '</a><span class="sep">·</span><a data-status="cancelled">已取消 ' + cn + '</a><span class="sep">·</span><a data-status="completed">已完成 ' + cp + '</a>';
      aux.querySelectorAll("a").forEach((el) => {
        el.addEventListener("click", () => { activeStatus = el.getAttribute("data-status"); render(); });
      });
    }

    // 项目空间入口可见状态
    const PROJECT_SPACE_VISIBLE = ["auto-approved", "matching", "quoting", "in-progress"];

    function render() {
      const all = window.demoApp.getDemands();
      const curWs = window.demoApp.getCurrentWorkspaceId();
      let list = activeScope === "current" ? all.filter((d) => d.workspace === curWs) : all;
      if (activeStatus !== "all") {
        const filterFn = STAT_GROUPS[activeStatus] || ((d) => d.status === activeStatus);
        list = list.filter(filterFn);
      }
      if (activeCat) list = list.filter((d) => (d.category || "").indexOf(activeCat) === 0);
      if (searchKey) {
        const k = searchKey.toLowerCase();
        list = list.filter((d) => (d.title || "").toLowerCase().includes(k) || (d.id || "").toLowerCase().includes(k));
      }
      $("resultCount").textContent = "共 " + list.length + " 条";
      const body = $("listBody");
      if (!list.length) {
        body.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>没有符合条件的需求<br><a href="demand-publish.html" style="color:#1890ff;text-decoration:none">→ 立即发布一个新需求</a></div>';
        renderStats();
        return;
      }
      const html = list.map((d) => {
        const status = STATUS_CONFIG[d.status] || { label: d.status, className: "" };
        const ws = window.demoApp.WORKSPACES[d.workspace] || { name: d.workspaceName || d.workspace };
        const wsClass = "ws-pill " + d.workspace;
        const isHighlight = d.id === highlightId;
        const payTrace = d.paymentStatus === "frozen"
          ? '<div style="font-size:11px;color:#389e0d;margin-top:2px">资金：预算已冻结' + (d.freezeOrderId ? ' · ' + d.freezeOrderId : '') + '</div>'
          : d.status === "pending-payment"
            ? '<div style="font-size:11px;color:#d46b08;margin-top:2px">资金：待付款，未冻结预算</div>'
          : '';

        // 状态徽章：auto-approved 增加 ✓ 自动通过标识
        const autoMark = status.autoMark ? '<span class="auto-mark" title="平台套餐 · 系统自动审核通过">✓</span>' : '';
        const badge = '<span class="status-badge ' + status.className + '">' + status.label + autoMark + '</span>';

        // 操作按钮组装
        const actions = [];
        // 项目空间入口（auto-approved / matching / quoting / in-progress 状态）
        if (PROJECT_SPACE_VISIBLE.indexOf(d.status) >= 0) {
          if (d.projectSpaceId) {
            actions.push('<a class="btn-link project-space" href="project-space.html?projectSpaceId=' + d.projectSpaceId + '&demandId=' + d.id + '" title="项目空间 ' + d.projectSpaceId + '">🤝 项目空间</a>');
          } else {
            actions.push('<button class="btn-link disabled" title="项目空间正在创建中" onclick="window.demoToast(\'项目空间正在创建中，请稍后刷新\', \'info\')">项目空间创建中…</button>');
          }
        }
        actions.push('<a class="btn-link" href="demand-detail.html?demandId=' + d.id + '">详情</a>');
        // 状态相关操作
        if (d.status === "pending-payment") {
          actions.push('<button class="btn-link urgent" onclick="window.continueDemandPayment(\'' + d.id + '\')">继续付款</button>');
          actions.push('<a class="btn-link" href="finance-center-prototype/recharge.html?from=demand-list&demandId=' + d.id + '">去补余额</a>');
        } else if (d.status === "quoting") {
          actions.push('<a class="btn-link urgent" href="demand-quote-comparison.html?demandId=' + d.id + '">对比报价 (' + (d.quotesCount || 0) + ')</a>');
        } else if (d.status === "rejected") {
          actions.push('<a class="btn-link urgent" href="demand-publish.html">修改并重提</a>');
        } else if (d.status === "cancelled" || d.status === "completed") {
          actions.push('<button class="btn-link" onclick="window.demoToast(\'归档详情下版本补齐\', \'info\')">归档</button>');
        }

        const quoteCell = d.quotesCount > 0 ? '<span class="quotes-count ' + (d.status === "quoting" ? "active" : "") + '">' + d.quotesCount + ' 家</span>' : '<span style="color:#bfbfbf">—</span>';
        const contractor = d.contractor ? '<div style="font-size:12px;color:#1890ff;margin-top:2px">承制方：' + d.contractor + '</div>' : '';
        return '<div class="list-row ' + (isHighlight ? "highlight" : "") + '">'
          + '<div><a class="demand-title" href="demand-detail.html?demandId=' + d.id + '" style="text-decoration:none">' + d.title + '</a><div class="demand-id">' + d.id + ' · ' + d.createTime + '</div>' + contractor + '</div>'
          + '<div style="font-size:13px;color:#595959">' + d.category + '</div>'
          + '<div><span class="' + wsClass + '">' + ws.name + '</span><div style="font-size:11px;color:#8c8c8c;margin-top:2px">扣款：' + (d.payerLabel || "—") + '</div>' + payTrace + '</div>'
          + '<div>' + badge + '<div style="font-size:11px;color:#8c8c8c;margin-top:2px">' + status.desc + '</div></div>'
          + '<div>' + quoteCell + '</div>'
          + '<div><div style="font-weight:500">' + window.fmtMoney(d.budget) + '</div><div style="font-size:11px;color:#8c8c8c">截止 ' + d.deadline + '</div></div>'
          + '<div class="row-actions">' + actions.join('') + '</div>'
          + '</div>';
      }).join("");
      body.innerHTML = html;
      renderStats();
      if (isHighlightInList(list)) {
        setTimeout(() => {
          const el = body.querySelector(".list-row.highlight");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 100);
      }
    }

    function isHighlightInList(list) { return highlightId && list.some((d) => d.id === highlightId); }

    function makeNowStr() {
      return new Date().toLocaleString("zh-CN", { hour12: false });
    }

    function makeProjectSpaceId() {
      return "PS-" + new Date().toISOString().slice(0, 10).replace(/-/g, "") + Math.floor(Math.random() * 9000 + 1000);
    }

    function getAvailableBalance(walletKey) {
      const wallets = window.demoApp.getWallets ? window.demoApp.getWallets() : {};
      const wallet = wallets[walletKey];
      if (!wallet) return 0;
      return Number(wallet.available_balance != null ? wallet.available_balance : wallet.balance) || 0;
    }

    window.continueDemandPayment = function (demandId) {
      const demand = window.demoApp.getDemands().find((item) => item.id === demandId);
      if (!demand) {
        window.demoToast("未找到这条待付款需求", "err");
        return;
      }
      const amount = Number(demand.budget) || 0;
      const walletKey = demand.walletKey || (window.demoApp.WORKSPACES[demand.workspace] || {}).walletKey;
      const available = getAvailableBalance(walletKey);
      if (!walletKey || !amount) {
        window.demoToast("付款账户或金额异常，请重新提交需求", "err");
        return;
      }
      if (available < amount) {
        const shortage = amount - available;
        window.demoToast("余额仍不足，还差 " + window.fmtMoney(shortage) + "，请先补充余额或预算", "warn");
        setTimeout(() => {
          location.href = "finance-center-prototype/recharge.html?from=demand-list&demandId=" + encodeURIComponent(demandId) + "&amount=" + encodeURIComponent(shortage);
        }, 900);
        return;
      }

      const result = window.demoApp.tccTry({
        walletKey,
        amount,
        demandId,
        orderTitle: demand.title,
        biz_type: "demand_budget_lock",
        operator: "昭岚",
        expireDays: 7
      });
      if (!result || !result.ok) {
        window.demoToast((result && result.error) || "付款冻结失败，请稍后重试", "err");
        return;
      }

      const nowStr = makeNowStr();
      const partial = {
        paymentStatus: "frozen",
        paymentShortage: 0,
        freezeOrderId: result.freezeId,
        voucherNo: result.voucherNo
      };
      if (demand.requirementType === "PLATFORM_SKU") {
        partial.status = "auto-approved";
        partial.auditMode = "auto";
        partial.auditedBy = "system-auto";
        partial.auditedAt = nowStr;
        partial.projectSpaceId = demand.projectSpaceId || makeProjectSpaceId();
        partial.projectSpaceCreatedAt = nowStr;
      } else {
        partial.status = "auditing";
        partial.auditMode = "manual";
        partial.auditedBy = null;
        partial.auditedAt = null;
      }
      window.demoApp.updateDemand(demandId, partial);
      window.demoToast("付款成功，预算已冻结：" + window.fmtMoney(amount), "ok");
      activeStatus = "all";
      render();
    };

    $("filterScope").addEventListener("change", (e) => { activeScope = e.target.value; render(); });
    $("filterCat").addEventListener("change", (e) => { activeCat = e.target.value; render(); });
    $("searchInput").addEventListener("input", (e) => { searchKey = e.target.value.trim(); render(); });

    window.onWorkspaceChanged = () => render();

    // 提示新提交（区分套餐自动通过 vs 自定义审核中）
    if (highlightId) {
      const paid = new URLSearchParams(location.search).get("paid") === "1";
      const pendingPayment = new URLSearchParams(location.search).get("pendingPayment") === "1";
      const all = window.demoApp.getDemands();
      const d = all.find((x) => x.id === highlightId);
      if (d) {
        if (pendingPayment && d.status === "pending-payment") {
          setTimeout(() => window.demoToast("已保存为待付款需求，补足余额后再继续付款", "warn"), 300);
        }
        if (paid && d.paymentStatus === "frozen") {
          setTimeout(() => window.demoToast("💰 预算已冻结：" + window.fmtMoney(d.budget) + "，冻结单 " + (d.freezeOrderId || "已生成"), "ok"), 300);
        }
        if (d.status === "auto-approved") {
          setTimeout(() => window.demoToast("✅ 需求 " + highlightId + " · 平台套餐已自动审核通过", "ok"), paid ? 900 : pendingPayment ? 900 : 300);
          if (d.projectSpaceId) {
            setTimeout(() => window.demoToast("🤝 项目协同空间已创建：" + d.projectSpaceId + "，可立即进入跟进", "info"), paid ? 1600 : 1100);
          }
        } else if (d.status === "auditing") {
          setTimeout(() => window.demoToast("✅ 需求 " + highlightId + " 已提交，平台核定中（≤24h）", "ok"), paid ? 900 : pendingPayment ? 900 : 300);
        } else if (d.status === "pending-payment") {
          setTimeout(() => window.demoToast("需求 " + highlightId + " 暂未付款，不会进入审核或撮合", "info"), pendingPayment ? 900 : 300);
        } else {
          setTimeout(() => window.demoToast("✅ 需求 " + highlightId + " 已更新", "ok"), paid ? 900 : 300);
        }
      }
    }

    render();
  })();
  </script>
</body>
</html>
