<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目协同空间 - 天合短剧剪辑接单平台</title>
  
  <!-- Ant Design CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .appLayout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 200px;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.06);
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebarHeader {
      padding: 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #1890ff;
      text-decoration: none;
      display: block;
    }

    .menu {
      padding: 16px 0;
    }

    .menuItem {
      display: block;
      padding: 12px 24px;
      color: #262626;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
      border-left: 3px solid transparent;
    }

    .menuItem:hover {
      background-color: #f0f0f0;
      color: #1890ff;
    }

    .menuItem.active {
      background-color: #e6f7ff;
      color: #1890ff;
      border-left-color: #1890ff;
      font-weight: 500;
    }

    .menuItemIcon {
      margin-right: 8px;
      font-size: 16px;
    }

    .menuGroup {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .menuGroupTitle {
      padding: 8px 24px;
      font-size: 12px;
      color: #8c8c8c;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }


    .mainContent {
      flex: 1;
      margin-left: 200px;
      min-height: 100vh;
      background: #f5f5f5;
    }

    .projectSpace {
      padding: 24px;
    }

    .backButton {
      margin-bottom: 16px;
    }

    .headerCard {
      margin-bottom: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .projectTitle {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 600;
      color: #262626;
    }

    .orderInfo {
      color: #8c8c8c;
      font-size: 14px;
    }

    .contentCard {
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      background: #fff;
    }

    .statusTag {
      font-size: 14px;
      padding: 4px 12px;
      border-radius: 4px;
    }

    .statusTag.processing {
      background: #e6f7ff;
      color: #1890ff;
      border: 1px solid #91d5ff;
    }

    .statusTag.submitted {
      background: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }

    .statusTag.approved {
      background: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }

    .statusTag.revision {
      background: #fff7e6;
      color: #fa8c16;
      border: 1px solid #ffd591;
    }

    .statusTag.accepted {
      background: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }

    .stageProgress { display: flex; align-items: center; background: #fff; border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; overflow-x: auto; gap: 0; }
    .stageNode { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 6px 10px; border-radius: 6px; min-width: 72px; transition: all .2s; position: relative; }
    .stageNode:hover { background: #f0f5ff; }
    .stageNode.active { background: #e6f7ff; }
    .stageNode.selected { background: #1890ff; }
    .stageNode.selected .stageDot { background: #fff; border-color: #fff; }
    .stageNode.selected .stageLabel { color: #fff; }
    .stageNode.selected .stageCount { color: rgba(255,255,255,.85); }
    .stageDot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #d9d9d9; background: #fff; margin-bottom: 4px; transition: all .2s; }
    .stageNode.done .stageDot { background: #52c41a; border-color: #52c41a; }
    .stageNode.active .stageDot { background: #1890ff; border-color: #1890ff; box-shadow: 0 0 0 3px rgba(24,144,255,.2); }
    .stageLabel { font-size: 11px; font-weight: 600; color: #595959; white-space: nowrap; }
    .stageCount { font-size: 10px; color: #8c8c8c; margin-top: 1px; }
    .stageArrow { color: #d9d9d9; font-size: 14px; margin: 0 2px; flex-shrink: 0; }
    .inheritTag { display: inline-block; background: #f0f0f0; color: #8c8c8c; border-radius: 3px; padding: 1px 6px; font-size: 10px; margin-left: 6px; }
    .versionCard {
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }

    .versionCard:hover {
      border-color: #1890ff;
      box-shadow: 0 2px 8px rgba(24, 144, 255, 0.1);
    }

    .versionCard.current {
      border-color: #52c41a;
      background: #f6ffed;
    }

    .timelineItem {
      padding: 16px;
      border-left: 2px solid #f0f0f0;
      margin-left: 20px;
      margin-bottom: 16px;
      position: relative;
    }

    .timelineItem::before {
      content: '';
      position: absolute;
      left: -6px;
      top: 20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1890ff;
    }

    .timelineItem.revision::before {
      background: #fa8c16;
    }

    .timelineItem.approved::before {
      background: #52c41a;
    }

    .uploadArea {
      border: 2px dashed #d9d9d9;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.3s;
    }

    .uploadArea:hover {
      border-color: #1890ff;
      background: #e6f7ff;
    }

    .memberAvatar {
      margin-right: 8px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .mainContent {
        margin-left: 0;
      }

      .projectSpace {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  
  <!-- Day.js -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
  
  <!-- Ant Design JS -->
  <script src="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.js"></script>
  
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Card, Tag, Button, Tabs, Descriptions, Space, Typography, List, Avatar, Upload, Timeline, Input, InputNumber, message, Modal, Select, Form, Alert, Table, Switch } = antd;
    const { TabPane } = Tabs;
    const { Title, Text } = Typography;
    const { TextArea } = Input;
    const { Option } = Select;

    // 获取 URL 参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 从 localStorage 读取或初始化项目空间数据（基于项目ID）
    function getProjectSpaceData(projectId) {
      const key = `projectSpace_${projectId}`;
      const stored = localStorage.getItem(key);
      if (stored) {
        return JSON.parse(stored);
      }
      return null;
    }

    // 保存项目空间数据到 localStorage（基于项目ID）
    function saveProjectSpaceData(projectId, data) {
      const key = `projectSpace_${projectId}`;
      localStorage.setItem(key, JSON.stringify(data));
    }

    // 兼容旧版本：从 localStorage 读取或初始化订单空间数据（基于订单ID）
    function getOrderSpaceData(orderId) {
      const key = `orderSpace_${orderId}`;
      const stored = localStorage.getItem(key);
      if (stored) {
        return JSON.parse(stored);
      }
      return null;
    }

    // 兼容旧版本：保存订单空间数据到 localStorage（基于订单ID）
    // 同时保存到项目空间（基于项目ID），实现多个订单共享
    function saveOrderSpaceData(orderId, data) {
      const key = `orderSpace_${orderId}`;
      localStorage.setItem(key, JSON.stringify(data));
      // 同时保存到项目空间（基于项目ID），实现多个订单共享
      if (data.projectId) {
        saveProjectSpaceData(data.projectId, data);
      }
    }

    // 保存项目空间数据（优先使用此函数）
    function saveSpaceData(data) {
      if (data.projectId) {
        saveProjectSpaceData(data.projectId, data);
      }
      // 如果有orderId，也保存到订单空间（兼容）
      if (data.orderId) {
        saveOrderSpaceData(data.orderId, data);
      }
    }

    // 初始化项目空间数据（基于项目ID）
    function initProjectSpaceData(projectId, projectInfo) {
      const materialsFromProject = (projectInfo.materialPackageFiles && projectInfo.materialPackageFiles.length > 0)
        ? projectInfo.materialPackageFiles.map((f, i) => ({
            id: f.uid || String(i + 1),
            name: f.name,
            size: f.size,
            type: (f.name && f.name.split('.').pop()) || 'file',
          }))
        : [
            { id: '1', name: '原始素材_第01-05集.zip', size: 1073741824, type: 'zip' },
            { id: '2', name: 'BGM音乐库.zip', size: 524288000, type: 'zip' },
            { id: '3', name: '字幕模板.srt', size: 102400, type: 'srt' },
          ];
      const defaultData = {
        projectId: projectId,
        projectName: projectInfo.projectName || '未命名项目',
        coordinator: projectInfo.coordinator || '',
        // 项目基础信息
        category: projectInfo.category || '短剧',
        projectTags: projectInfo.projectTags || [],
        projectStage: projectInfo.projectStage || '精剪中',
        contentGenre: projectInfo.contentGenre || '',
        difficulty: projectInfo.difficulty || '工厂',
        participantTeam: projectInfo.participantTeam || '线上',
        deliveryCycleDays: projectInfo.deliveryCycleDays || 7,
        takeMode: projectInfo.takeMode || '抢单',
        quotaTotal: projectInfo.quotaTotal || 1,
        // 需求与素材（来自项目）
        requirementText: projectInfo.requirementText || '',
        requirementAttachments: projectInfo.requirementAttachments || [],
        deliveryRequirements: projectInfo.deliveryRequirements || {},
        deliveryRequirementAttachments: projectInfo.deliveryRequirementAttachments || [],
        materialNote: projectInfo.materialNote || '',
        materialPackageFiles: projectInfo.materialPackageFiles || [],
        // 订单列表（多个订单共享一个项目空间）
        orders: [],
        // 项目空间通用数据
        members: [
          { id: '1', name: '当前用户', role: '学员', avatar: '👤' },
          { id: '2', name: '李运营', role: '运营', avatar: '👨‍💼' },
          { id: '3', name: '王审核', role: '审核', avatar: '👩‍💼' },
        ],
        materials: materialsFromProject,
        deliveries: [], // 所有订单的交付版本
        revisions: [], // 所有订单的修改意见
        messages: [], // 项目空间内的沟通消息
      };
      saveProjectSpaceData(projectId, defaultData);
      return defaultData;
    }

    // 初始化订单空间数据（兼容旧版本）
    function initOrderSpaceData(orderId, orderInfo) {
      // 从项目数据中获取基础信息（如果orderInfo中没有）
      let projectInfo = {};
      if (orderInfo.projectId) {
        // 尝试从mockProjects中获取项目信息
        const mockProjects = JSON.parse(localStorage.getItem('mockProjects') || '[]');
        const project = mockProjects.find(p => p.id === orderInfo.projectId);
        if (project) {
          projectInfo = {
            coordinator: project.coordinator,
            category: project.category,
            projectTags: project.projectTags || [],
            projectStage: project.projectStage,
            contentGenre: project.contentGenre,
            difficulty: project.difficulty,
            participantTeam: project.participantTeam,
            deliveryCycleDays: project.deliveryCycleDays,
            takeMode: project.takeMode,
            quotaTotal: project.quotaTotal,
          };
        }
      }
      
      const defaultData = {
        orderId: orderId,
        projectId: orderInfo.projectId,
        projectName: orderInfo.projectName,
        coordinator: projectInfo.coordinator || orderInfo.coordinator || '',
        taker: orderInfo.taker || '当前用户',
        takerRole: orderInfo.takerRole || '剪辑师',
        // 项目基础信息
        projectStage: projectInfo.projectStage || '精剪中',
        category: projectInfo.category || orderInfo.category || '短剧',
        projectTags: projectInfo.projectTags || orderInfo.projectTags || [],
        contentGenre: projectInfo.contentGenre || orderInfo.contentGenre || '',
        difficulty: projectInfo.difficulty || orderInfo.difficulty || '工厂',
        participantTeam: projectInfo.participantTeam || orderInfo.participantTeam || '线上',
        deliveryCycleDays: projectInfo.deliveryCycleDays || orderInfo.deliveryCycleDays || 7,
        takeMode: projectInfo.takeMode || orderInfo.takeMode || '抢单',
        quotaTotal: projectInfo.quotaTotal || orderInfo.quotaTotal || 1,
        // 订单信息
        status: orderInfo.status || 'InProgress',
        takeTime: orderInfo.takeTime,
        dueTime: orderInfo.dueTime,
        unitPrice: orderInfo.unitPrice,
        episodeCount: orderInfo.episodeCount,
        members: [
          { id: '1', name: '当前用户', role: '学员', avatar: '👤' },
          { id: '2', name: '李运营', role: '运营', avatar: '👨‍💼' },
          { id: '3', name: '王审核', role: '审核', avatar: '👩‍💼' },
        ],
        materials: [
          { id: '1', name: '原始素材_第01-05集.zip', size: 1073741824, type: 'zip' },
          { id: '2', name: 'BGM音乐库.zip', size: 524288000, type: 'zip' },
          { id: '3', name: '字幕模板.srt', size: 102400, type: 'srt' },
        ],
        deliveries: [],
        revisions: [],
        messages: [],
      };
      saveOrderSpaceData(orderId, defaultData);
      return defaultData;
    }

    // 更新订单状态
    function updateOrderStatus(orderId, newStatus) {
      const orders = JSON.parse(localStorage.getItem('currentOrders') || '[]');
      const orderIndex = orders.findIndex(o => o.orderId === orderId || o.id === orderId);
      if (orderIndex !== -1) {
        orders[orderIndex].status = newStatus;
        localStorage.setItem('currentOrders', JSON.stringify(orders));
        
        // 同时更新项目空间数据（基于项目ID）
        const order = orders[orderIndex];
        if (order.projectId) {
          const projectSpaceData = getProjectSpaceData(order.projectId);
          if (projectSpaceData) {
            // 更新项目空间中该订单的状态
            if (!projectSpaceData.orders) {
              projectSpaceData.orders = [];
            }
            const orderInSpace = projectSpaceData.orders.find(o => o.orderId === orderId || o.id === orderId);
            if (orderInSpace) {
              orderInSpace.status = newStatus;
            } else {
              projectSpaceData.orders.push({ ...order, status: newStatus });
            }
            saveProjectSpaceData(order.projectId, projectSpaceData);
          }
        }
      }
      
      // 兼容旧版本：同时更新订单空间数据
      const spaceData = getOrderSpaceData(orderId);
      if (spaceData) {
        spaceData.status = newStatus;
        saveOrderSpaceData(orderId, spaceData);
      }
    }

    const ProjectSpace = () => {
      const [activeTab, setActiveTab] = useState('overview');
      const [orderData, setOrderData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [uploadModalVisible, setUploadModalVisible] = useState(false);
      const [changeNote, setChangeNote] = useState('');
      const [episodeNumber, setEpisodeNumber] = useState(1);
      const [messageContent, setMessageContent] = useState('');
      const [revisionForm] = Form.useForm();
      const [revisionModalVisible, setRevisionModalVisible] = useState(false);
      const [selectedVersion, setSelectedVersion] = useState('');
      const [messageImages, setMessageImages] = useState([]);
      const [amountAdjustModalVisible, setAmountAdjustModalVisible] = useState(false);
      const [amountAdjustEditingRecord, setAmountAdjustEditingRecord] = useState(null);
      const [amountAdjustEditingValue, setAmountAdjustEditingValue] = useState(0);
      const [amountAdjustReason, setAmountAdjustReason] = useState('');
      const [deliveryEpisodeFilter, setDeliveryEpisodeFilter] = useState(null); // null=全部, 1-20=该集
      const [deliveryStageFilter, setDeliveryStageFilter] = useState(null); // 初始null，首次渲染时设为当前阶段
      const [addMemberModalVisible, setAddMemberModalVisible] = useState(false);
      const [newMemberName, setNewMemberName] = useState('');
      const [newMemberRole, setNewMemberRole] = useState('学员');
      const [newMemberAvatar, setNewMemberAvatar] = useState('👤');
      const orderId = getUrlParam('orderId');
      const projectId = getUrlParam('projectId');

      useEffect(() => {
        // 根据业务逻辑：一个项目ID对应一个项目空间，多个订单共享一个项目空间
        // 优先使用projectId访问项目空间
        if (!projectId && !orderId) {
          setLoading(false);
          return;
        }

        let spaceData = null;
        let orderInfo = null;

        // 优先基于projectId获取项目空间
        if (projectId) {
          spaceData = getProjectSpaceData(projectId);
          
          // 如果项目空间不存在，尝试从项目数据初始化
          if (!spaceData) {
            // 尝试从adminProjects或mockProjects获取项目信息
            const adminProjects = JSON.parse(localStorage.getItem('adminProjects') || '[]');
            const mockProjects = JSON.parse(localStorage.getItem('mockProjects') || '[]');
            const projectInfo = adminProjects.find(p => p.id == projectId) || 
                               mockProjects.find(p => p.id == projectId);
            
            if (projectInfo) {
              spaceData = initProjectSpaceData(projectId, projectInfo);
            } else {
              // 如果找不到项目信息，但有orderId，使用订单信息初始化
              if (orderId) {
                const orders = JSON.parse(localStorage.getItem('currentOrders') || '[]');
                orderInfo = orders.find(o => o.orderId === orderId || o.id === orderId);
                if (orderInfo && orderInfo.projectId == projectId) {
                  // 使用订单信息初始化项目空间
                  const tempSpaceData = initOrderSpaceData(orderId, orderInfo);
                  // 转换为项目空间格式并保存
                  spaceData = {
                    ...tempSpaceData,
                    projectId: projectId,
                    orders: [orderInfo],
                  };
                  saveProjectSpaceData(projectId, spaceData);
                }
              }
            }
          }
        }

        // 如果没有projectId但有orderId，使用旧逻辑（向后兼容）
        if (!spaceData && orderId) {
          const orders = JSON.parse(localStorage.getItem('currentOrders') || '[]');
          orderInfo = orders.find(o => o.orderId === orderId || o.id === orderId);

          if (!orderInfo) {
            setLoading(false);
            return;
          }

          // 尝试从项目空间获取（如果订单的projectId对应的项目空间已存在）
          if (orderInfo.projectId) {
            spaceData = getProjectSpaceData(orderInfo.projectId);
          }

          // 如果项目空间不存在，使用订单空间数据（兼容旧版本）
          if (!spaceData) {
            spaceData = getOrderSpaceData(orderId);
            if (!spaceData) {
              spaceData = initOrderSpaceData(orderId, orderInfo);
            }
            // 将订单空间数据同步到项目空间
            if (orderInfo.projectId && spaceData) {
              saveProjectSpaceData(orderInfo.projectId, spaceData);
            }
          }
        }

        if (!spaceData) {
          setLoading(false);
          return;
        }

        // 确保所有必需的数组字段都存在，避免 undefined
        if (spaceData) {
          if (!Array.isArray(spaceData.deliveries)) spaceData.deliveries = [];
          const isOldMock = spaceData.deliveries.length === 3 && spaceData.deliveries.every(d => d.id && String(d.id).startsWith('delivery_mock_'));
          if (spaceData.deliveries.length === 0 || isOldMock) {
            const pn = spaceData.projectName || '未命名项目';
            spaceData.deliveries = [
              { id: 'delivery_mock_1', version: 'V1-1', episodeNumber: 1, episodeVersion: 1, fileName: `${pn}_V1-1.zip`, uploadTime: dayjs().subtract(12, 'day').format('YYYY-MM-DD HH:mm:ss'), uploader: '当前用户', changeNote: '第1集初剪完成，已按分镜完成剪辑与调色', status: 'Approved', fileSize: 268435456, isFinalized: true, stage: '精剪中', inherited: false },
              { id: 'delivery_mock_1b', version: 'V1-2', episodeNumber: 1, episodeVersion: 2, fileName: `${pn}_V1-2.zip`, uploadTime: dayjs().subtract(11, 'day').format('YYYY-MM-DD HH:mm:ss'), uploader: '当前用户', changeNote: '第1集精修版，补镜头与调色', status: 'Approved', fileSize: 272629760, isFinalized: true, stage: '精剪中', inherited: false },
              { id: 'delivery_mock_2', version: 'V2-1', episodeNumber: 2, episodeVersion: 1, fileName: `${pn}_V2-1.zip`, uploadTime: dayjs().subtract(10, 'day').format('YYYY-MM-DD HH:mm:ss'), uploader: '当前用户', changeNote: '第2集第一版提交', status: 'Approved', fileSize: 314572800, isFinalized: true, stage: '精剪中', inherited: false },
              { id: 'delivery_mock_3', version: 'V3-1', episodeNumber: 3, episodeVersion: 1, fileName: `${pn}_V3-1.zip`, uploadTime: dayjs().subtract(9, 'day').format('YYYY-MM-DD HH:mm:ss'), uploader: '当前用户', changeNote: '第3集初剪完成', status: 'Approved', fileSize: 293601280, isFinalized: true, stage: '精剪中', inherited: false },
              // 内部一审阶段：第1集有修改重传，第2、3集继承
              { id: 'delivery_mock_4', version: 'V1-1', episodeNumber: 1, episodeVersion: 1, fileName: `${pn}_V1-1_一审.zip`, uploadTime: dayjs().subtract(7, 'day').format('YYYY-MM-DD HH:mm:ss'), uploader: '当前用户', changeNote: '一审修改：调整片头节奏', status: 'Approved', fileSize: 275000000, isFinalized: true, stage: '内部一审', inherited: false },

                                border: '1px solid #e8e8e8'
                              }}>
                                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: '#262626' }}>
                                  💬 修改意见
                                </div>
                                <Timeline style={{ marginTop: 8 }}>
                                  {versionRevisions.map((revision) => (
                                    <Timeline.Item key={revision.id}>
                                      <div className={`timelineItem ${revision.type}`}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                                          <Space>
                                            <Tag color={revision.type === 'approved' ? 'green' : 'orange'}>
                                              {revision.type === 'approved' ? '审核通过' : '退回修改'}
                                            </Tag>
                                          </Space>
                                          <span style={{ color: '#8c8c8c', fontSize: 12 }}>
                                            {dayjs(revision.reviewTime).format('YYYY-MM-DD HH:mm:ss')}
                                          </span>
                                        </div>
                                        <div style={{ marginBottom: 8 }}>
                                          <Text strong>退回原因：</Text>
                                          <Text>{revision.reason}</Text>
                                        </div>
                                        <div>
                                          <Text strong>修改点：</Text>
                                          <Text>{revision.content}</Text>
                                        </div>
                                        <div style={{ marginTop: 8, color: '#8c8c8c', fontSize: 12 }}>
                                          审核人：{revision.reviewer}
                                        </div>
                                      </div>
                                    </Timeline.Item>
                                  ))}
                                </Timeline>
                              </div>
                            )}
                          </div>
                        );
                      })
                      );
                    })()}
                    
                    {/* 添加修改意见弹窗 */}
                    <Modal
                      title="添加修改意见"
                      open={revisionModalVisible}
                      onCancel={handleCloseRevisionModal}
                      footer={null}
                      width={600}
                    >
                      <Form form={revisionForm} onFinish={handleAddRevision} layout="vertical">
                        <Form.Item name="version" label="版本" rules={[{ required: true, message: '请选择版本' }]}>
                          <Select placeholder="请选择版本" disabled={!!selectedVersion}>
                            {(orderData.deliveries || []).map(d => (
                              <Option key={d.id} value={d.version}>
                                {d.version} - {d.fileName} 
                                {d.status === 'Approved' && <Tag color="green" style={{ marginLeft: 8 }}>已通过</Tag>}
                                {d.status === 'NeedRevision' && <Tag color="orange" style={{ marginLeft: 8 }}>需修改</Tag>}
                              </Option>
                            ))}
                          </Select>
                        </Form.Item>
                        <Form.Item name="reason" label="退回原因" rules={[{ required: true, message: '请选择退回原因' }]}>
                          <Select placeholder="请选择退回原因">
                            <Option value="画面质量问题">画面质量问题</Option>
                            <Option value="音频问题">音频问题</Option>
                            <Option value="字幕问题">字幕问题</Option>
                            <Option value="内容不符合要求">内容不符合要求</Option>
                            <Option value="其他">其他</Option>
                          </Select>
                        </Form.Item>
                        <Form.Item name="content" label="修改点" rules={[{ required: true, message: '请输入修改点' }]}>
                          <TextArea rows={4} placeholder="请详细说明需要修改的内容" />
                        </Form.Item>
                        <Form.Item>
                          <Space style={{ width: '100%', justifyContent: 'flex-end' }}>
                            <Button onClick={handleCloseRevisionModal}>取消</Button>
                            <Button type="primary" htmlType="submit">提交修改意见</Button>
                          </Space>
                        </Form.Item>
                      </Form>
                    </Modal>
                    
                    <Upload
                      beforeUpload={handleUpload}
                      showUploadList={false}
                    >
                      <Button type="primary" size="large" style={{ marginTop: 16 }}>
                        📤 上传新版本
                      </Button>
                    </Upload>
                  </div>
                </TabPane>

                <TabPane tab="💭 沟通" key="messages">
                  <div style={{ marginTop: 16 }}>
                    <List
                      dataSource={orderData.messages || []}
                      renderItem={(item) => (
                        <List.Item>
                          <List.Item.Meta
                            avatar={<Avatar>{item.sender.charAt(0)}</Avatar>}
                            title={
                              <Space>
                                <span>{item.sender}</span>
                                <span style={{ color: '#8c8c8c', fontSize: 12 }}>
                                  {dayjs(item.time).format('YYYY-MM-DD HH:mm:ss')}
                                </span>
                              </Space>
                            }
                            description={
                              <div>
                                {item.content && (
                                  <div style={{ marginBottom: item.images && item.images.length > 0 ? 8 : 0 }}>
                                    {item.content}
                                  </div>
                                )}
                                {item.images && item.images.length > 0 && (
                                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 8 }}>
                                    {item.images.map((img, index) => (
                                      <div key={index} style={{ position: 'relative' }}>
                                        <img
                                          src={img.url}
                                          alt={img.name}
                                          style={{
                                            maxWidth: '200px',
                                            maxHeight: '200px',
                                            borderRadius: '4px',
                                            cursor: 'pointer',
                                            border: '1px solid #e8e8e8',
                                          }}
                                          onClick={() => {
                                            Modal.info({
                                              title: img.name,
                                              content: (
                                                <img
                                                  src={img.url}
                                                  alt={img.name}
                                                  style={{ width: '100%', maxHeight: '600px', objectFit: 'contain' }}
                                                />
                                              ),
                                              width: 800,
                                            });
                                          }}
                                        />
                                      </div>
                                    ))}
                                  </div>
                                )}
                              </div>
                            }
                          />
                        </List.Item>
                      )}
                    />
                    <div style={{ marginTop: 16, padding: '16px', background: '#fafafa', borderRadius: '8px' }}>
                      <TextArea
                        rows={4}
                        placeholder="输入消息内容"
                        value={messageContent}
                        onChange={(e) => setMessageContent(e.target.value)}
                        style={{ marginBottom: 12 }}
                      />
                      <div style={{ marginBottom: 12 }}>
                        <Upload
                          accept="image/*"
                          beforeUpload={handleImageUpload}
                          onRemove={handleRemoveImage}
                          fileList={messageImages}
                          listType="picture-card"
                          maxCount={9}
                        >
                          {messageImages.length < 9 && (
                            <div>
                              <div style={{ fontSize: 24 }}>+</div>
                              <div style={{ marginTop: 8 }}>上传图片</div>
                            </div>
                          )}
                        </Upload>
                      </div>
                      <Button type="primary" onClick={handleSendMessage}>发送消息</Button>
                    </div>
                  </div>
                </TabPane>

                <TabPane tab="📋 订单" key="review">
                  <div style={{ marginTop: 16 }}>
                    <Card title="项目订单" style={{ marginBottom: 16 }}>
                      {reviewTableDataSource.length === 0 ? (
                        <div style={{ textAlign: 'center', padding: '24px', color: '#8c8c8c' }}>暂无订单数据</div>
                      ) : (
                        <Table
                          dataSource={reviewTableDataSource}
                          rowKey={(r) => r.orderId || r.id || String(reviewTableDataSource.indexOf(r))}
                          pagination={{ pageSize: 10, showTotal: (total) => `共 ${total} 条订单` }}
                          size="small"
                          scroll={{ x: 1000 }}
                          columns={[
                            { title: '订单号', dataIndex: 'orderId', key: 'orderId', width: 160, render: (v) => v || '-' },
                            { title: '接单用户', dataIndex: 'taker', key: 'taker', width: 120, render: (v) => v || '-' },
                            { title: '接单角色', dataIndex: 'takerRole', key: 'takerRole', width: 100, render: (v) => v || '-' },
                            { title: '集数', dataIndex: 'episodeCount', key: 'episodeCount', width: 80, render: (v) => v != null ? `${v} 集` : '-' },
                            { title: '交付情况', key: 'deliveries', width: 100, render: () => (orderData.deliveries && orderData.deliveries.length > 0) ? `共 ${orderData.deliveries.length} 个版本` : '-' },
                            { title: '订单金额', key: 'baseAmount', width: 140, render: (_, r) => (r.unitPrice != null && r.episodeCount != null) ? `¥${(r.unitPrice * r.episodeCount).toFixed(2)}` : '-' },
                            { title: '差额', key: 'amountAdjust', width: 180, render: (_, record) => (
                              <Space size="small">
                                <InputNumber
                                  min={-999999}
                                  max={999999}
                                  step={1}
                                  precision={0}
                                  value={record.amountAdjust ?? 0}
                                  onChange={(v) => {
                                    const val = Math.round(Number(v) || 0);
                                    if (orderData.orders && orderData.orders.length > 0) {
                                      const next = orderData.orders.map(o => (o.orderId === record.orderId || o.id === record.orderId) ? { ...o, amountAdjust: val } : o);
                                      setOrderData({ ...orderData, orders: next });
                                    } else {
                                      setOrderData({ ...orderData, amountAdjust: val });
                                    }
                                  }}
                                  style={{ width: 120 }}
                                />
                                <Button type="primary" size="small" onClick={() => { setAmountAdjustEditingRecord(record); setAmountAdjustEditingValue(record.amountAdjust ?? 0); setAmountAdjustReason(''); setAmountAdjustModalVisible(true); }}>保存</Button>
                              </Space>
                            )},
                            { title: '合计金额', key: 'total', width: 120, render: (_, r) => {
                              const base = (r.unitPrice != null && r.episodeCount != null) ? r.unitPrice * r.episodeCount : 0;
                              const adj = Number(r.amountAdjust) || 0;
                              return base || adj ? `¥${(base + adj).toFixed(2)}` : '-';
                            }},
                            { title: '差额原因', dataIndex: 'amountAdjustReason', key: 'amountAdjustReason', width: 160, ellipsis: true, render: (v) => v || '-' },
                          ]}
                        />
                      )}
                      <Text type="secondary" style={{ display: 'block', marginTop: 12 }}>差额：正数为加款，负数为扣款。修改后点击该行「保存」须填写原因（留痕）后生效。</Text>
                    </Card>

                    {orderId && (orderData.status === 'Approved' ? (
                      <Card>
                        <Alert message="当前订单已通过审核，可申请验收" type="success" showIcon style={{ marginBottom: 16 }} />
                        <Button type="primary" size="large" onClick={handleAccept}>申请验收</Button>
                      </Card>
                    ) : orderData.status === 'Accepted' ? (
                      <Card>
                        <Alert message="当前订单已验收，收益已入账" type="success" showIcon />
                      </Card>
                    ) : (
                      <div style={{ textAlign: 'center', padding: '24px', color: '#8c8c8c' }}>
                        {orderData.status === 'Submitted' ? '当前订单已提交，等待审核' : orderData.status === 'NeedRevision' ? '当前订单已退回修改' : '当前订单尚未通过审核'}
                      </div>
                    ))}
                  </div>
                </TabPane>
              </Tabs>
            </Card>
            </div>
          </div>

          {/* 上传文件对话框 */}
          {/* 差额保存弹窗：必填原因 */}
          <Modal
            title="保存差额"
            open={amountAdjustModalVisible}
            onOk={() => amountAdjustEditingRecord && handleSaveAmountAdjust(amountAdjustEditingRecord, amountAdjustEditingValue, amountAdjustReason)}
            onCancel={() => {
              setAmountAdjustModalVisible(false);
              setAmountAdjustReason('');
              setAmountAdjustEditingRecord(null);
            }}
            okText="确认保存"
            cancelText="取消"
          >
            <div style={{ marginBottom: 16 }}>
              <Text strong>订单号：</Text>
              <span>{amountAdjustEditingRecord?.orderId || '-'}</span>
            </div>
            <div style={{ marginBottom: 16 }}>
              <Text strong style={{ display: 'block', marginBottom: 8 }}>差额（元）</Text>
              <InputNumber
                min={-999999}
                max={999999}
                step={1}
                precision={0}
                value={amountAdjustEditingValue}
                onChange={(v) => setAmountAdjustEditingValue(v ?? 0)}
                style={{ width: '100%' }}
              />
            </div>
            <div>
              <Text strong style={{ display: 'block', marginBottom: 8 }}>原因（必填）</Text>
              <TextArea
                rows={4}
                placeholder="请填写差额原因，用于留痕与对账"
                value={amountAdjustReason}
                onChange={(e) => setAmountAdjustReason(e.target.value)}
              />
            </div>
          </Modal>

          <Modal
            title="上传交付文件"
            open={uploadModalVisible}
            onOk={handleConfirmUpload}
            onCancel={() => {
              setUploadModalVisible(false);
              setChangeNote('');
              setEpisodeNumber(1);
            }}
          >
            <div style={{ marginBottom: 16 }}>
              <Upload
                beforeUpload={() => false}
                showUploadList={true}
              >
                <Button>选择文件</Button>
              </Upload>
            </div>
            <div style={{ marginBottom: 16 }}>
              <Text strong style={{ display: 'block', marginBottom: 8 }}>第几集</Text>
              <InputNumber
                min={1}
                max={orderData?.episodeCount || 999}
                value={episodeNumber}
                onChange={(v) => setEpisodeNumber(v ?? 1)}
                placeholder="填写本附件对应的集数"
                style={{ width: '100%' }}
              />
              {orderData?.episodeCount != null && (
                <Text type="secondary" style={{ fontSize: 12, marginTop: 4 }}>本订单共 {orderData.episodeCount} 集</Text>
              )}
            </div>
            <div style={{ marginBottom: 16, padding: '12px', background: '#f6ffed', border: '1px solid #b7eb8f', borderRadius: 4 }}>
              <Text strong>本次将为：</Text>
              <Text>第 {episodeNumber || 1} 集 第 {(orderData?.deliveries || []).filter((d) => Number(d.episodeNumber) === Number(episodeNumber || 1)).length + 1} 版</Text>
              <Text type="secondary" style={{ marginLeft: 8 }}>（版本号：V{episodeNumber || 1}-{(orderData?.deliveries || []).filter((d) => Number(d.episodeNumber) === Number(episodeNumber || 1)).length + 1}）</Text>
            </div>
            <div>
              <Text strong>变更说明：</Text>
              <TextArea
                rows={4}
                placeholder="请说明本次提交的变更内容"
                value={changeNote}
                onChange={(e) => setChangeNote(e.target.value)}
                style={{ marginTop: 8 }}
              />
            </div>
          </Modal>

          <Modal
            title="添加成员"
            open={addMemberModalVisible}
            onOk={handleAddMember}
            onCancel={() => {
              setAddMemberModalVisible(false);
              setNewMemberName('');
              setNewMemberRole('学员');
              setNewMemberAvatar('👤');
            }}
            okText="添加"
            cancelText="取消"
          >
            <div style={{ marginBottom: 16 }}>
              <Text strong style={{ display: 'block', marginBottom: 8 }}>姓名</Text>
              <Input
                placeholder="请输入成员姓名"
                value={newMemberName}
                onChange={(e) => setNewMemberName(e.target.value)}
              />
            </div>
            <div style={{ marginBottom: 16 }}>
              <Text strong style={{ display: 'block', marginBottom: 8 }}>角色</Text>
              <Select
                placeholder="请选择角色"
                value={newMemberRole}
                onChange={setNewMemberRole}
                style={{ width: '100%' }}
              >
                <Option value="学员">学员</Option>
                <Option value="运营">运营</Option>
                <Option value="审核">审核</Option>
                <Option value="剪辑师">剪辑师</Option>
                <Option value="其他">其他</Option>
              </Select>
            </div>
            <div style={{ marginBottom: 16 }}>
              <Text strong style={{ display: 'block', marginBottom: 8 }}>头像</Text>
              <Select
                placeholder="请选择头像"
                value={newMemberAvatar}
                onChange={setNewMemberAvatar}
                style={{ width: '100%' }}
              >
                <Option value="👤">👤 默认</Option>
                <Option value="👨‍💼">👨‍💼 运营</Option>
                <Option value="👩‍💼">👩‍💼 审核</Option>
                <Option value="✂️">✂️ 剪辑</Option>
                <Option value="📋">📋 其他</Option>
              </Select>
            </div>
          </Modal>
        </div>
      );
    };

    function renderApp() {
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        setTimeout(renderApp, 100);
        return;
      }
      
      try {
        ReactDOM.render(<ProjectSpace />, document.getElementById('root'));
      } catch (error) {
        console.error('渲染错误:', error);
        document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red;">页面加载失败: ' + error.message + '</div>';
      }
    }

    if (document.readyState === 'loading') {
      window.addEventListener('load', renderApp);
    } else {
      renderApp();
    }
  </script>
</body>
</html>
